<!DOCTYPE html>
<html lang="es">
<head>
  <meta name="theme-color" content="#4CAF50">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Control de Surtidos</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
</head>
<body>

<h1>Control de Surtidos</h1>

<button onclick="crearSurtido()">➕ Nuevo Surtido</button>
  
  <button onclick="exportarBackup()">💾 Guardar copia</button>

<input type="file" id="inputBackup" hidden onchange="importarBackup(event)">
<button onclick="document.getElementById('inputBackup').click()">
  📂 Restaurar copia
</button>

<div id="surtidos"></div>

<!-- MODAL VENTA -->
<div id="modalVenta" class="modal hidden">
  <div class="modal-content">
    <h3>Registrar venta</h3>
      <input id="inputKg" type="number" placeholder="Cantidad en kilos">
      <input id="inputNota" placeholder="Nota (opcional)">
    <button onclick="confirmarVenta()">Confirmar</button>
    <button onclick="cerrarModal()">Cancelar</button>
  </div>
</div>

<!-- MODAL HISTORIAL -->
<div id="modalHistorial" class="modal hidden">
  <div class="modal-content">
    <h3>Historial</h3>
    <div id="listaHistorial"></div>
    <button onclick="cerrarHistorial()">Cerrar</button>
  </div>
</div>

  <div id="modalEditar" class="modal hidden">
  <div class="modal-content">

    <h3>Editar producto</h3>

    <input id="editKilos" type="number" placeholder="Kilos totales">
    <input id="editCompra" type="number" placeholder="Precio compra">
    <input id="editVenta" type="number" placeholder="Precio venta">

    <button onclick="guardarEdicion()">Guardar</button>
    <button onclick="cerrarEditar()">Cancelar</button>

  </div>
</div>


  <div id="modalResumen" class="modal hidden">
  <div class="modal-content">

    <h3>Resumen del surtido</h3>

    <p><strong>Inversión:</strong> <span id="resCapital"></span></p>
    <p><strong>Vendido:</strong> <span id="resTotal"></span></p>
    <p><strong>Ganancia:</strong> <span id="resGanancia"></span></p>

    <button onclick="cerrarResumen()">Cerrar</button>

  </div>
</div>

<script src="storage.js"></script>
<script src="app.js"></script>
</body>
</html>
